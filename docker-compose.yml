services:

  # change to official image when available https://github.com/radiantearth/stac-browser/pull/386
  stac-browser:
    build:
      context: dockerfiles
      dockerfile: Dockerfile.browser
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8085 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - name: stac-browser
        target: 8085
        published: 8085
        protocol: tcp
        mode: host
    depends_on:
      stac-fastapi:
        condition: service_healthy
      titiler-pgstac:
        condition: service_healthy
      database:
        condition: service_healthy

  stac-fastapi:
    image: ghcr.io/stac-utils/stac-fastapi-pgstac:5.0.2
    healthcheck:
      test: [
        "CMD-SHELL",
        "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/_mgmt/ping', timeout=3).read()\""
      ]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - name: stac-fastapi
        target: 8080
        published: 8081
        protocol: tcp
        mode: host
    environment:
      # Postgres connection
      - POSTGRES_USER=username
      - POSTGRES_PASS=password
      - POSTGRES_DBNAME=postgis
      - POSTGRES_HOST_READER=database
      - POSTGRES_HOST_WRITER=database
      - POSTGRES_PORT=5432
      - DB_MIN_CONN_SIZE=1
      - DB_MAX_CONN_SIZE=1
    depends_on:
      database:
        condition: service_healthy

  titiler-pgstac:
    # At the time of writing, rasterio and psycopg wheels are not available for arm64 arch
    # so we force the image to be built with linux/amd64
    platform: linux/amd64
    image: ghcr.io/stac-utils/titiler-pgstac:1.7.2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - name: titiler-pgstac
        target: 80
        published: 8082
        protocol: tcp
        mode: host
    environment:
      # Postgres connection
      - POSTGRES_USER=username
      - POSTGRES_PASS=password
      - POSTGRES_DBNAME=postgis
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - DB_MIN_CONN_SIZE=1
      - DB_MAX_CONN_SIZE=10
      # - DB_MAX_QUERIES=10
      # - DB_MAX_IDLE=10
      # GDAL Config
      - CPL_TMPDIR=/tmp
      - GDAL_CACHEMAX=75%
      - GDAL_INGESTED_BYTES_AT_OPEN=32768
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
      - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      - GDAL_HTTP_MULTIPLEX=YES
      - GDAL_HTTP_VERSION=2
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=536870912
      # TiTiler Config
      - MOSAIC_CONCURRENCY=1
      # AWS S3 endpoint config
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      database:
        condition: service_healthy

  tipg:
    image: ghcr.io/developmentseed/tipg:1.0.1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - name: tipg
        target: 80
        published: 8083
        protocol: tcp
        mode: host
    environment:
      # Postgres connection
      - POSTGRES_USER=username
      - POSTGRES_PASS=password
      - POSTGRES_DBNAME=postgis
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - DB_MIN_CONN_SIZE=1
      - DB_MAX_CONN_SIZE=10
    depends_on:
      database:
        condition: service_healthy

  database:
    image: ghcr.io/stac-utils/pgstac:v0.9.6
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d postgis"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      - POSTGRES_USER=username
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgis
      - PGUSER=username
      - PGPASSWORD=password
      - PGDATABASE=postgis
    ports:
      - name: database
        target: 5432
        published: 5439
        protocol: tcp
        mode: host
    command: postgres -N 500
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

networks:
  default:
    name: eoapi-network
